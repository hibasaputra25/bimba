const{useState,useEffect,useCallback}=React;
const v=n=>`var(${n})`;
const store={
  get:(k,d)=>{try{const val=localStorage.getItem(k);return val?JSON.parse(val):d;}catch{return d;}},
  set:(k,val)=>{try{localStorage.setItem(k,JSON.stringify(val));}catch{}}
};

function useApi(baseUrl,apiKey){
  const call=useCallback(async(method,path,body)=>{
    const res=await fetch(`${baseUrl}${path}`,{method,headers:{'Content-Type':'application/json','x-api-key':apiKey},body:body?JSON.stringify(body):undefined});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||`HTTP ${res.status}`);
    return data;
  },[baseUrl,apiKey]);
  return{get:p=>call('GET',p),post:(p,b)=>call('POST',p,b),put:(p,b)=>call('PUT',p,b),patch:(p,b)=>call('PATCH',p,b),del:p=>call('DELETE',p)};
}

function useToast(){
  const[toasts,setToasts]=useState([]);
  const add=(msg,type='success')=>{const id=Date.now();setToasts(p=>[...p.slice(-4),{id,msg,type}]);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3500);};
  return{toasts,toast:add};
}

function Toast({toasts}){
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,display:'flex',flexDirection:'column',gap:8,pointerEvents:'none'}}>
      {toasts.map(t=>(
        <div key={t.id} style={{background:t.type==='error'?'#1a0a0a':t.type==='warn'?'#1a1200':'#0a1a0e',color:t.type==='error'?'#fca5a5':t.type==='warn'?'#fcd34d':'#86efac',border:`1px solid ${t.type==='error'?'#7f1d1d':t.type==='warn'?'#78350f':'#14532d'}`,borderRadius:v('--radius-sm'),padding:'10px 16px',fontSize:13,fontWeight:500,maxWidth:320,pointerEvents:'auto',animation:'slideUp .2s ease'}}>
          {t.type==='error'?'✕ ':t.type==='warn'?'⚠ ':'✓ '}{t.msg}
        </div>
      ))}
    </div>
  );
}

function ConnectModal({onConnect}){
  const[url,setUrl]=useState(store.get('bimba_url','http://localhost:3001'));
  const[key,setKey]=useState(store.get('bimba_key',''));
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState('');
  async function handleConnect(){
    if(!url||!key){setErr('Isi semua field.');return;}
    setLoading(true);setErr('');
    try{
      const res=await fetch(`${url}/health`,{headers:{'x-api-key':key}});
      if(!res.ok)throw new Error(`Server merespons ${res.status}`);
      store.set('bimba_url',url);store.set('bimba_key',key);onConnect(url,key);
    }catch(e){setErr(`Gagal terhubung: ${e.message}`);}
    finally{setLoading(false);}
  }
  const inp=(val,set,type='text',ph='')=><input value={val} onChange={e=>set(e.target.value)} type={type} placeholder={ph} style={{width:'100%',border:`1px solid ${v('--border')}`,borderRadius:v('--radius-sm'),padding:'9px 12px',fontSize:13,fontFamily:v('--mono'),background:v('--bg'),color:v('--text')}}/>;

    <div style={{position:'fixed',inset:0,background:'rgba(15,20,18,.85)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>

        <h2 style={{fontSize:20,fontWeight:700,marginBottom:6}}>Bimba Admin Panel</h2>
        <p style={{color:v('--text-2'),fontSize:13,marginBottom:24}}>Masukkan alamat server dan API key untuk terhubung.</p>
        <label style={{fontSize:12,fontWeight:600,color:v('--text-2'),display:'block',marginBottom:6}}>URL SERVER CORE</label>
        <div style={{marginBottom:16}}>{inp(url,setUrl,'text','http://localhost:3001')}</div>
        <label style={{fontSize:12,fontWeight:600,color:v('--text-2'),display:'block',marginBottom:6}}>INTERNAL API KEY</label>
        <div style={{marginBottom:20}}>{inp(key,setKey,'password','bimba-secret-key')}</div>
        {err&&<p style={{color:v('--red'),fontSize:12,marginBottom:16}}>{err}</p>}
        <button onClick={handleConnect} disabled={loading} style={{width:'100%',padding:11,background:v('--green-600'),color:'#fff',borderRadius:v('--radius-sm'),fontWeight:600,fontSize:14,opacity:loading?0.6:1}}>{loading?'Menghubungkan...':'Hubungkan →'}</button>
      </div>
    </div>
  );
}

// Parse string reset Groq seperti "2m59.56s", "23h59m", "59.5s" → detik
function parseGroqReset(str) {
  if (!str) return null;
  let total = 0;
  const h = str.match(/(\d+)h/);
  const m = str.match(/(\d+)m(?!s)/);
  const s = str.match(/([\d.]+)s/);
  if (h) total += parseInt(h[1]) * 3600;
  if (m) total += parseInt(m[1]) * 60;
  if (s) total += parseFloat(s[1]);
  return Math.ceil(total);
}

// Format detik → "2m 59d" atau "45d"
function fmtCountdown(sec) {
  if (sec <= 0) return '0d';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}j ${m}m`;
  if (m > 0) return `${m}m ${s}d`;
  return `${s}d`;
}

function useCountdown(resetStr) {
  const [secs, setSecs] = useState(() => parseGroqReset(resetStr));
  const startRef = React.useRef(Date.now());
  useEffect(() => {
    const initial = parseGroqReset(resetStr);
    if (initial === null) { setSecs(null); return; }
    startRef.current = Date.now();
    const elapsed = Math.floor((Date.now() - startRef.current) / 1000);
    setSecs(Math.max(0, initial - elapsed));
    const id = setInterval(() => setSecs(p => p !== null ? Math.max(0, p - 1) : null), 1000);
    return () => clearInterval(id);
  }, [resetStr]);
  return secs;
}

/**
 * CountdownBadge — tampilkan countdown reset Groq.
 * Saat countdown TPM mencapai 0, tampilkan estimasi reset penuh
 * berdasarkan limitTokens karena TPM Groq reset setiap menit.
 * Ini estimasi — nilai real baru diketahui saat ada OCR request berikutnya.
 */
function CountdownBadge({ resetStr, label, isTPM, limitTokens }) {
  const secs = useCountdown(resetStr);
  if (secs === null) return null;
  const urgent = secs > 0 && secs < 60;
  const isReset = secs <= 0;

  // Untuk TPM: saat countdown habis, tampilkan estimasi sudah reset
  const tpmResetMsg = isTPM && isReset && limitTokens
    ? `✅ Estimasi reset (~${limitTokens.toLocaleString('id-ID')} token tersedia)`
    : null;

  return (
    <div style={{fontSize:11,color:v('--text-3'),marginTop:4,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
      <span>{label}:</span>
      {tpmResetMsg
        ? <span style={{fontFamily:v('--mono'),fontWeight:600,color:v('--green-500'),background:v('--green-50'),padding:'1px 7px',borderRadius:99,fontSize:11}}>{tpmResetMsg}</span>
        : <span style={{fontFamily:v('--mono'),fontWeight:600,color:urgent?v('--red'):isReset?v('--green-500'):v('--text-2'),background:urgent?v('--red-light'):isReset?v('--green-50'):v('--bg'),padding:'1px 7px',borderRadius:99,fontSize:11}}>
            {isReset ? '✅ Sudah reset' : `⏱ ${fmtCountdown(secs)}`}
          </span>
      }
      {isTPM && isReset && <span style={{fontSize:10,color:v('--text-3'),fontStyle:'italic'}}>(konfirmasi saat OCR berikutnya)</span>}
    </div>
  );
}

function PagePayments({api,toast}){
  const[data,setData]=useState([]);
  const[filter,setFilter]=useState('all');
  const[loading,setLoading]=useState(false);
  const[updating,setUpdating]=useState(null);
  const load=useCallback(async()=>{
    setLoading(true);
    try{const q=filter!=='all'?`?status=${filter}&limit=100`:'?limit=100';const r=await api.get(`/api/payment-logs/detail${q}`);setData(r.rows||[]);}
    catch(e){toast(e.message,'error');}finally{setLoading(false);}
  },[filter]);
  useEffect(()=>{load();},[load]);
  async function updateStatus(id,status){setUpdating(id);try{await api.patch(`/api/payment-logs/${id}/status`,{status});toast(`Status → ${STATUS_META[status]?.label||status}`);load();}catch(e){toast(e.message,'error');}finally{setUpdating(null);}}
  const filters=[{v:'all',l:'Semua'},{v:'pending_review',l:'Menunggu'},{v:'verified',l:'Terverifikasi'},{v:'wrong_account',l:'Rek. Salah'},{v:'rejected',l:'Ditolak'}];
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:20}}>
        <div><h1 style={{fontSize:22,fontWeight:700}}>Log Pembayaran</h1><p style={{color:v('--text-3'),fontSize:13,marginTop:3}}>Verifikasi bukti transfer dari wali murid</p></div>
        <button onClick={load} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',background:v('--surface'),border:`1px solid ${v('--border')}`,borderRadius:v('--radius-sm'),fontSize:13,color:v('--text-2'),fontWeight:500}}><Icon name="refresh" size={14}/> Refresh</button>
      </div>
      <div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}}>
        {filters.map(f=><button key={f.v} onClick={()=>setFilter(f.v)} style={{padding:'6px 14px',borderRadius:99,fontSize:12,fontWeight:600,background:filter===f.v?v('--green-800'):v('--surface'),color:filter===f.v?'#fff':v('--text-2'),border:`1px solid ${filter===f.v?v('--green-800'):v('--border')}`}}>{f.l}</button>)}
      </div>
      <div style={{background:v('--surface'),border:`1px solid ${v('--border')}`,borderRadius:v('--radius'),overflow:'auto'}}>
        {loading?<div style={{padding:40,textAlign:'center',color:v('--text-3')}}>Memuat...</div>:(
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:900}}>
            <thead><tr style={{background:v('--surface-2')}}>{['#','Wali Murid','Pengirim','Nominal','Bank','Referensi','Tgl','Status','Aksi'].map(h=><th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:11,fontWeight:600,color:v('--text-3'),textTransform:'uppercase',letterSpacing:.4,whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
            <tbody>
              {data.length===0&&<tr><td colSpan={9} style={{padding:32,textAlign:'center',color:v('--text-3')}}>Tidak ada data</td></tr>}
              {data.map(p=>(
                <tr key={p.id} style={{borderTop:`1px solid ${v('--border')}`,transition:'background .1s'}} onMouseEnter={e=>e.currentTarget.style.background=v('--bg')} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <td style={{padding:'10px 14px',fontSize:12,color:v('--text-3'),fontFamily:v('--mono')}}>{p.id}</td>
                  <td style={{padding:'10px 14px'}}><div style={{fontWeight:500,fontSize:13}}>{p.name}</div><div style={{fontSize:11,color:v('--text-3'),fontFamily:v('--mono')}}>{p.phone?.replace('@c.us','')}</div></td>
                  <td style={{padding:'10px 14px',fontSize:13,fontWeight:500}}>{p.nama_pengirim||'—'}</td>
                  <td style={{padding:'10px 14px',fontFamily:v('--mono'),fontWeight:600,fontSize:13}}>{p.nominal_formatted||(p.nominal?`Rp ${Number(p.nominal).toLocaleString('id-ID')}`:'—')}</td>
                  <td style={{padding:'10px 14px',fontSize:13,color:v('--text-2')}}>{p.bank_pengirim||'—'}</td>
                  <td style={{padding:'10px 14px',fontFamily:v('--mono'),fontSize:11,color:v('--text-3'),maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={p.no_referensi}>{p.no_referensi||'—'}</td>
                  <td style={{padding:'10px 14px',fontSize:12,color:v('--text-3'),whiteSpace:'nowrap'}}>{p.tanggal||'—'}</td>
                  <td style={{padding:'10px 14px'}}><StatusBadge status={p.status}/></td>
                  <td style={{padding:'10px 14px'}}>
                    {(p.status==='pending_review'||p.status==='unverified_account')?(
                      <div style={{display:'flex',gap:6}}>
                        <button onClick={()=>updateStatus(p.id,'verified')} disabled={updating===p.id} style={{padding:'5px 10px',background:v('--green-50'),color:v('--green-500'),border:`1px solid ${v('--green-100')}`,borderRadius:6,fontSize:12,fontWeight:600}}>✓ Verifikasi</button>
                        <button onClick={()=>updateStatus(p.id,'rejected')} disabled={updating===p.id} style={{padding:'5px 10px',background:v('--red-light'),color:v('--red'),border:'1px solid #fecaca',borderRadius:6,fontSize:12,fontWeight:600}}>✕ Tolak</button>
                      </div>
                    ):<span style={{fontSize:12,color:v('--text-3')}}>—</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

  const[loading,setLoading]=useState(false);
  const[exiting,setExiting]=useState(null);
  const load=useCallback(async()=>{setLoading(true);try{setActive(await api.get('/api/human-active'));}catch(e){toast(e.message,'error');}finally{setLoading(false);}});
  useEffect(()=>{load();},[]);
  async function exitMode(phone){setExiting(phone);try{const r=await api.post('/api/exit-human-mode',{targetNumber:phone});if(r.wasActive){toast('Sesi admin berakhir. Bot aktif kembali.');load();}else toast('Nomor tidak dalam mode admin.','warn');}catch(e){toast(e.message,'error');}finally{setExiting(null);}}
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:20}}>
        <div><h1 style={{fontSize:22,fontWeight:700}}>Mode Admin Aktif</h1><p style={{color:v('--text-3'),fontSize:13,marginTop:3}}>Sesi percakapan yang sedang ditangani admin secara manual</p></div>
        <button onClick={load} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',background:v('--surface'),border:`1px solid ${v('--border')}`,borderRadius:v('--radius-sm'),fontSize:13,color:v('--text-2'),fontWeight:500}}><Icon name="refresh" size={14}/> Refresh</button>
      </div>
      {loading?<div style={{padding:40,textAlign:'center',color:v('--text-3')}}>Memuat...</div>:active.length===0?(
        <div style={{background:v('--surface'),border:`1px solid ${v('--border')}`,borderRadius:v('--radius'),padding:48,textAlign:'center'}}>
          <div style={{fontSize:32,marginBottom:12}}>✅</div>
          <div style={{fontWeight:600,marginBottom:4}}>Tidak ada sesi aktif</div>
          <div style={{fontSize:13,color:v('--text-3')}}>Semua wali murid sedang dilayani bot secara otomatis</div>
        </div>
      ):(
        <div style={{display:'grid',gap:12}}>
          {active.map(u=>(
            <div key={u.phone} style={{background:v('--surface'),border:`1px solid ${v('--border')}`,borderRadius:v('--radius'),padding:'18px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:16}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}><span style={{width:8,height:8,borderRadius:'50%',background:'#3b82f6',display:'inline-block',animation:'pulse 2s infinite'}}/><strong style={{fontSize:14}}>{u.last_name||'Wali Murid'}</strong><span style={{fontFamily:v('--mono'),fontSize:12,color:v('--text-3')}}>{u.phone?.replace('@c.us','')}</span></div>
                {u.last_message&&<div style={{fontSize:13,color:v('--text-2'),maxWidth:480,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>Pesan terakhir: "{u.last_message}"</div>}
                <div style={{fontSize:11,color:v('--text-3'),marginTop:4}}>Mode aktif sejak: {new Date(u.updated_at).toLocaleString('id-ID')}</div>
              </div>
              <button onClick={()=>exitMode(u.phone)} disabled={exiting===u.phone} style={{padding:'8px 16px',background:v('--red-light'),color:v('--red'),border:'1px solid #fecaca',borderRadius:v('--radius-sm'),fontSize:13,fontWeight:600,whiteSpace:'nowrap',flexShrink:0}}>{exiting===u.phone?'Memproses...':'Akhiri Sesi'}</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── PageResponses — FUNGSIONAL LENGKAP ───────────────────────
function PageResponses({api,toast}){
  const[items,setItems]=useState([]);
  const[loading,setLoading]=useState(false);
  const[saving,setSaving]=useState(false);
  const[deleting,setDeleting]=useState(null);
  const[form,setForm]=useState({keywords:'',response:'',active:true});
  const[editId,setEditId]=useState(null);
  const[showForm,setShowForm]=useState(false);

  const load=useCallback(async()=>{
    setLoading(true);
    try{setItems(await api.get('/api/keyword-responses'));}
    catch(e){toast(e.message,'error');}
    finally{setLoading(false);}
  },[]);
  useEffect(()=>{load();},[load]);

  function startAdd(){setForm({keywords:'',response:'',active:true});setEditId(null);setShowForm(true);}
  function startEdit(item){setForm({keywords:item.keywords.join(', '),response:item.response,active:item.active});setEditId(item.id);setShowForm(true);}

  async function handleSave(){
    if(!form.keywords.trim()||!form.response.trim()){toast('Kata kunci dan balasan wajib diisi.','warn');return;}
    setSaving(true);
    try{
      const body={keywords:form.keywords.split(',').map(k=>k.trim().toLowerCase()).filter(Boolean),response:form.response.trim(),active:form.active};
      if(editId)await api.put(`/api/keyword-responses/${editId}`,body);
      else await api.post('/api/keyword-responses',body);
      toast(editId?'Respons diperbarui!':'Respons ditambahkan!');
      setShowForm(false);setEditId(null);load();
    }catch(e){toast(e.message,'error');}
    finally{setSaving(false);}
  }

  async function handleDelete(id){
    if(!confirm('Hapus respons ini?'))return;
    setDeleting(id);
    try{await api.del(`/api/keyword-responses/${id}`);toast('Respons dihapus.');load();}
    catch(e){toast(e.message,'error');}
    finally{setDeleting(null);}
  }

  async function toggleActive(item){
    try{await api.put(`/api/keyword-responses/${item.id}`,{keywords:item.keywords,response:item.response,active:!item.active});load();}
    catch(e){toast(e.message,'error');}
  }

  const IS={width:'100%',border:`1px solid ${v('--border')}`,borderRadius:v('--radius-sm'),padding:'9px 12px',fontSize:13,background:v('--bg'),color:v('--text')};
  const LS={fontSize:12,fontWeight:600,color:v('--text-2'),display:'block',marginBottom:4};

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:20}}>
        <div><h1 style={{fontSize:22,fontWeight:700}}>Respons Bot</h1><p style={{color:v('--text-3'),fontSize:13,marginTop:3}}>Balasan otomatis berdasarkan kata kunci pesan wali murid</p></div>
        <button onClick={startAdd} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 16px',background:v('--green-700'),color:'#fff',borderRadius:v('--radius-sm'),fontSize:13,fontWeight:600}}><Icon name="add" size={14}/> Tambah Respons</button>
      </div>

      {showForm&&(
        <div style={{background:v('--surface'),border:`1px solid ${v('--border')}`,borderRadius:v('--radius'),marginBottom:16,overflow:'hidden'}}>
          <div style={{padding:'14px 20px',borderBottom:`1px solid ${v('--border')}`,background:v('--surface-2'),display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontWeight:600,fontSize:14}}>{editId?'Edit Respons':'Tambah Respons Baru'}</div>
            <button onClick={()=>setShowForm(false)} style={{background:'transparent',color:v('--text-3'),display:'flex',alignItems:'center'}}><Icon name="close" size={18}/></button>
          </div>
          <div style={{padding:20}}>
            <div style={{marginBottom:14}}>
              <label style={LS}>KATA KUNCI</label>
              <p style={{fontSize:12,color:v('--text-3'),marginBottom:6}}>Pisahkan dengan koma. Contoh: <code style={{background:v('--bg'),padding:'1px 6px',borderRadius:4}}>tagihan, bayar, cicilan</code></p>
              <input value={form.keywords} onChange={e=>setForm(p=>({...p,keywords:e.target.value}))} placeholder="kata kunci 1, kata kunci 2, ..." style={IS}/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={LS}>BALASAN BOT</label>
              <p style={{fontSize:12,color:v('--text-3'),marginBottom:6}}>Gunakan <code style={{background:v('--bg'),padding:'1px 6px',borderRadius:4}}>{'{nama}'}</code> untuk nama wali murid. Gunakan *teks* untuk bold di WA.</p>
              <textarea value={form.response} onChange={e=>setForm(p=>({...p,response:e.target.value}))} rows={4} placeholder="Halo {nama}! ..." style={{...IS,resize:'vertical',lineHeight:1.6}}/>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16,cursor:'pointer'}} onClick={()=>setForm(p=>({...p,active:!p.active}))}>
              <div style={{width:36,height:20,borderRadius:99,background:form.active?v('--green-500'):'#cbd5e1',position:'relative',transition:'background .2s',flexShrink:0}}>
                <div style={{position:'absolute',top:2,left:form.active?18:2,width:16,height:16,borderRadius:'50%',background:'#fff',transition:'left .2s'}}/>
              </div>
              <span style={{fontSize:13,fontWeight:500,userSelect:'none'}}>Aktif</span>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={handleSave} disabled={saving} style={{padding:'9px 20px',background:v('--green-700'),color:'#fff',borderRadius:v('--radius-sm'),fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:6,opacity:saving?0.7:1}}><Icon name="save" size={14}/>{saving?'Menyimpan...':editId?'Simpan Perubahan':'Tambah'}</button>
              <button onClick={()=>{setShowForm(false);setEditId(null);}} style={{padding:'9px 16px',background:v('--surface'),border:`1px solid ${v('--border')}`,borderRadius:v('--radius-sm'),fontSize:13,color:v('--text-2')}}>Batal</button>
            </div>
          </div>
        </div>
      )}

      <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:v('--radius-sm'),padding:'12px 16px',marginBottom:16,fontSize:13,color:'#1e40af'}}>
        <strong>ℹ️ Cara kerja:</strong> Bot mengecek apakah pesan wali murid mengandung salah satu kata kunci. Jika cocok, bot membalas dengan teks yang ditentukan. Prioritas: menu utama (1/2/3) → kata kunci → fallback menu.
      </div>

      {loading?<div style={{padding:40,textAlign:'center',color:v('--text-3')}}>Memuat...</div>:items.length===0&&!showForm?(
        <div style={{background:v('--surface'),border:`1px solid ${v('--border')}`,borderRadius:v('--radius'),padding:48,textAlign:'center'}}>
          <div style={{fontSize:32,marginBottom:12}}>💬</div>
          <div style={{fontWeight:600,marginBottom:4}}>Belum ada respons kustom</div>
          <div style={{fontSize:13,color:v('--text-3'),marginBottom:20}}>Tambahkan balasan otomatis berdasarkan kata kunci</div>
          <button onClick={startAdd} style={{padding:'9px 20px',background:v('--green-700'),color:'#fff',borderRadius:v('--radius-sm'),fontSize:13,fontWeight:600}}>Tambah Pertama</button>
        </div>
      ):(
        <div style={{display:'grid',gap:10}}>
          {items.map(item=>(
            <div key={item.id} style={{background:v('--surface'),border:`1px solid ${item.active?v('--border'):'#e5e7eb'}`,borderRadius:v('--radius'),padding:'16px 20px',opacity:item.active?1:0.55,transition:'opacity .2s'}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
                    {item.keywords.map(k=>(
                      <span key={k} style={{display:'inline-flex',alignItems:'center',gap:4,background:v('--green-50'),color:v('--green-600'),border:`1px solid ${v('--green-100')}`,borderRadius:99,padding:'2px 10px',fontSize:12,fontWeight:600}}>
                        <Icon name="tag" size={10}/>{k}
                      </span>
                    ))}
                  </div>
                  <div style={{fontSize:13,color:v('--text-2'),background:v('--bg'),borderRadius:v('--radius-sm'),padding:'8px 12px',fontFamily:v('--mono'),whiteSpace:'pre-wrap',wordBreak:'break-word',maxHeight:72,overflow:'hidden'}}>
                    {item.response}
                  </div>
                </div>
                <div style={{display:'flex',gap:6,flexShrink:0}}>
                  <button onClick={()=>toggleActive(item)} style={{padding:'5px 10px',background:item.active?v('--amber-light'):v('--green-50'),color:item.active?v('--amber-dark'):v('--green-500'),border:`1px solid ${item.active?'#fde68a':v('--green-100')}`,borderRadius:6,fontSize:12,fontWeight:600}}>{item.active?'Nonaktifkan':'Aktifkan'}</button>
                  <button onClick={()=>startEdit(item)} style={{padding:'5px 10px',background:'#eff6ff',color:'#3b82f6',border:'1px solid #bfdbfe',borderRadius:6,fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:4}}><Icon name="edit" size={12}/>Edit</button>
                  <button onClick={()=>handleDelete(item.id)} disabled={deleting===item.id} style={{padding:'5px 10px',background:v('--red-light'),color:v('--red'),border:'1px solid #fecaca',borderRadius:6,fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:4}}><Icon name="trash" size={12}/>{deleting===item.id?'...':'Hapus'}</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function PageSpam({api,toast}){
  const[list,setList]=useState([]);
  const[loading,setLoading]=useState(false);
  const[unbanning,setUnbanning]=useState(null);

  const load=useCallback(async()=>{
    setLoading(true);
    try{setList(await api.get('/api/spam-list'));}
    catch(e){toast(e.message,'error');}
    finally{setLoading(false);}
  },[]);
  useEffect(()=>{load();},[load]);

  async function unban(phone){
    setUnbanning(phone);
    try{
      const r=await api.post('/api/spam-unban',{phone});
      toast(r.wasBanned?`Ban untuk ${phone.replace('@c.us','')} dicabut.`:`${phone.replace('@c.us','')} tidak sedang dibanned.`,'success');
      load();
    }catch(e){toast(e.message,'error');}
    finally{setUnbanning(null);}
  }

  function BanCountdown({sisaDetik}){
    const[secs,setSecs]=useState(sisaDetik);
    useEffect(()=>{
      if(secs<=0)return;
      const id=setInterval(()=>setSecs(p=>Math.max(0,p-1)),1000);
      return()=>clearInterval(id);
    },[]);
    if(secs<=0)return<span style={{color:v('--green-500'),fontWeight:600}}>Selesai</span>;
    const m=Math.floor(secs/60),s=secs%60;
    const urgent=secs<60;
    return<span style={{fontFamily:v('--mono'),fontWeight:600,color:urgent?v('--red'):v('--amber-dark'),background:urgent?v('--red-light'):v('--amber-light'),padding:'2px 8px',borderRadius:99,fontSize:12}}>⏱ {m>0?`${m}m ${s}d`:`${s}d`}</span>;
  }

  const banned=list.filter(x=>x.banned);
  const others=list.filter(x=>!x.banned);

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:20}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:700}}>Spam Filter</h1>
          <p style={{color:v('--text-3'),fontSize:13,marginTop:3}}>Monitor dan kelola nomor yang terkena rate limit bot</p>
        </div>
        <button onClick={load} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',background:v('--surface'),border:`1px solid ${v('--border')}`,borderRadius:v('--radius-sm'),fontSize:13,color:v('--text-2'),fontWeight:500}}><Icon name="refresh" size={14}/> Refresh</button>
      </div>

      {/* Info rules */}
      <div style={{background:v('--amber-light'),border:`1px solid #fde68a`,borderRadius:v('--radius-sm'),padding:'12px 16px',marginBottom:20,fontSize:13,color:v('--amber-dark')}}>
        <strong>⚙️ Aturan aktif:</strong> Maks <strong>15 pesan/menit</strong> dan <strong>5 gambar/menit</strong> per nomor. Ban otomatis selama <strong>5 menit</strong>.
      </div>

      {loading?<div style={{padding:40,textAlign:'center',color:v('--text-3')}}>Memuat...</div>:(
        <div style={{display:'grid',gap:16}}>

          {/* Sedang dibanned */}
          <div style={{background:v('--surface'),border:`1px solid ${v('--border')}`,borderRadius:v('--radius'),overflow:'hidden'}}>
            <div style={{padding:'14px 20px',borderBottom:`1px solid ${v('--border')}`,background:'#fff5f5',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{width:8,height:8,borderRadius:'50%',background:banned.length>0?v('--red'):'#d1d5db',display:'inline-block'}}/>
                <span style={{fontWeight:600,fontSize:14}}>Sedang Dibanned</span>
                {banned.length>0&&<span style={{background:v('--red-light'),color:v('--red'),borderRadius:99,padding:'1px 8px',fontSize:12,fontWeight:700}}>{banned.length}</span>}
              </div>
            </div>
            {banned.length===0?(
              <div style={{padding:32,textAlign:'center',color:v('--text-3'),fontSize:13}}>✅ Tidak ada nomor yang sedang dibanned</div>
            ):(
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr style={{background:v('--surface-2')}}>{['Nomor','Pesan','Gambar','Sisa Ban','Aksi'].map(h=><th key={h} style={{padding:'10px 16px',textAlign:'left',fontSize:11,fontWeight:600,color:v('--text-3'),textTransform:'uppercase',letterSpacing:.4}}>{h}</th>)}</tr></thead>
                <tbody>
                  {banned.map(item=>(
                    <tr key={item.phone} style={{borderTop:`1px solid ${v('--border')}`}}>
                      <td style={{padding:'12px 16px',fontFamily:v('--mono'),fontSize:13,fontWeight:500}}>{item.phone.replace('@c.us','')}</td>
                      <td style={{padding:'12px 16px',fontSize:13}}><span style={{background:v('--bg'),borderRadius:6,padding:'2px 8px',fontWeight:600}}>{item.msg_count}</span></td>
                      <td style={{padding:'12px 16px',fontSize:13}}><span style={{background:v('--bg'),borderRadius:6,padding:'2px 8px',fontWeight:600}}>{item.img_count}</span></td>
                      <td style={{padding:'12px 16px'}}><BanCountdown sisaDetik={item.sisa_detik}/></td>
                      <td style={{padding:'12px 16px'}}>
                        <button onClick={()=>unban(item.phone)} disabled={unbanning===item.phone} style={{padding:'5px 14px',background:v('--green-50'),color:v('--green-500'),border:`1px solid ${v('--green-100')}`,borderRadius:6,fontSize:12,fontWeight:600}}>
                          {unbanning===item.phone?'Memproses...':'✓ Cabut Ban'}
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>

          {/* Riwayat aktif (tidak dibanned tapi pernah tercatat) */}
          {others.length>0&&(
            <div style={{background:v('--surface'),border:`1px solid ${v('--border')}`,borderRadius:v('--radius'),overflow:'hidden'}}>
              <div style={{padding:'14px 20px',borderBottom:`1px solid ${v('--border')}`,background:v('--surface-2')}}>
                <span style={{fontWeight:600,fontSize:14}}>Riwayat Aktif Sesi Ini</span>
                <span style={{fontSize:12,color:v('--text-3'),marginLeft:8}}>Nomor yang pernah tercatat tapi tidak sedang dibanned</span>
              </div>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead><tr style={{background:v('--surface-2')}}>{['Nomor','Pesan','Gambar','Status'].map(h=><th key={h} style={{padding:'10px 16px',textAlign:'left',fontSize:11,fontWeight:600,color:v('--text-3'),textTransform:'uppercase',letterSpacing:.4}}>{h}</th>)}</tr></thead>
                <tbody>
                  {others.map(item=>(
                    <tr key={item.phone} style={{borderTop:`1px solid ${v('--border')}`}}>
                      <td style={{padding:'12px 16px',fontFamily:v('--mono'),fontSize:13}}>{item.phone.replace('@c.us','')}</td>
                      <td style={{padding:'12px 16px',fontSize:13}}>{item.msg_count}</td>
                      <td style={{padding:'12px 16px',fontSize:13}}>{item.img_count}</td>
                      <td style={{padding:'12px 16px'}}><span style={{background:v('--green-50'),color:v('--green-500'),border:`1px solid ${v('--green-100')}`,borderRadius:99,padding:'2px 10px',fontSize:12,fontWeight:600}}>Normal</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {list.length===0&&!loading&&(
            <div style={{background:v('--surface'),border:`1px solid ${v('--border')}`,borderRadius:v('--radius'),padding:48,textAlign:'center'}}>
              <div style={{fontSize:32,marginBottom:12}}>🛡️</div>
              <div style={{fontWeight:600,marginBottom:4}}>Belum ada aktivitas spam</div>
              <div style={{fontSize:13,color:v('--text-3')}}>Data akan muncul saat ada pesan masuk ke bot</div>
            </div>
          )}

        </div>
      )}
    </div>
  );
}

function PageSettings({api,toast}){
  const[config,setConfig]=useState({});
  const[loading,setLoading]=useState(false);
  const[saving,setSaving]=useState(false);
  useEffect(()=>{setLoading(true);api.get('/api/bot-config').then(d=>setConfig(d||{})).catch(e=>toast(e.message,'error')).finally(()=>setLoading(false));},[]);
  function setC(key,val){setConfig(p=>({...p,[key]:val}));}
  async function save(keys){setSaving(true);try{const body={};for(const k of keys)body[k]=config[k]??'';await api.put('/api/bot-config',body);toast('Pengaturan tersimpan!');}catch(e){toast(e.message,'error');}finally{setSaving(false);}}
  if(loading)return<div style={{padding:40,textAlign:'center',color:v('--text-3')}}>Memuat pengaturan...</div>;
  const Field=({label,desc,k,mono,area,rows=3})=>(
    <div style={{marginBottom:16}}>
      <label style={{fontSize:12,fontWeight:600,color:v('--text-2'),display:'block',marginBottom:4}}>{label}</label>
      {desc&&<p style={{fontSize:12,color:v('--text-3'),marginBottom:6}}>{desc}</p>}
      {area?<textarea value={config[k]||''} onChange={e=>setC(k,e.target.value)} rows={rows} style={{width:'100%',border:`1px solid ${v('--border')}`,borderRadius:v('--radius-sm'),padding:'9px 12px',fontSize:13,fontFamily:mono?v('--mono'):v('--font'),background:v('--bg'),color:v('--text'),resize:'vertical',lineHeight:1.6}}/>
           :<input value={config[k]||''} onChange={e=>setC(k,e.target.value)} style={{width:'100%',border:`1px solid ${v('--border')}`,borderRadius:v('--radius-sm'),padding:'9px 12px',fontSize:13,fontFamily:mono?v('--mono'):v('--font'),background:v('--bg'),color:v('--text')}}/>}
    </div>
  );
  const Section=({title,desc,children,saveKeys})=>(
    <div style={{background:v('--surface'),border:`1px solid ${v('--border')}`,borderRadius:v('--radius'),marginBottom:16,overflow:'hidden'}}>
      <div style={{padding:'16px 20px',borderBottom:`1px solid ${v('--border')}`,background:v('--surface-2')}}><div style={{fontWeight:600,fontSize:14}}>{title}</div>{desc&&<div style={{fontSize:12,color:v('--text-3'),marginTop:2}}>{desc}</div>}</div>
      <div style={{padding:20}}>
        {children}
        <button onClick={()=>save(saveKeys)} disabled={saving} style={{marginTop:8,padding:'9px 20px',background:v('--green-700'),color:'#fff',borderRadius:v('--radius-sm'),fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:6,opacity:saving?0.7:1}}><Icon name="save" size={14}/>{saving?'Menyimpan...':'Simpan Perubahan'}</button>
      </div>
    </div>
  );
  return(
    <div>
      <div style={{marginBottom:20}}><h1 style={{fontSize:22,fontWeight:700}}>Pengaturan Bot</h1><p style={{color:v('--text-3'),fontSize:13,marginTop:3}}>Ubah konfigurasi dan pesan bot tanpa menyentuh kode</p></div>
      <Section title="Informasi Rekening" desc="Ditampilkan saat wali murid meminta info pembayaran" saveKeys={['BIMBA_NAMA_BANK','BIMBA_NO_REKENING','BIMBA_NAMA_REKENING']}>
        <Field k="BIMBA_NAMA_BANK" label="NAMA BANK" mono/><Field k="BIMBA_NO_REKENING" label="NOMOR REKENING" mono/><Field k="BIMBA_NAMA_REKENING" label="NAMA PEMILIK REKENING"/>
      </Section>
      <Section title="Nomor Admin" desc="Nomor yang menerima notifikasi bukti transfer dan mode admin" saveKeys={['ADMIN_WA_NUMBER']}>
        <Field k="ADMIN_WA_NUMBER" label="NOMOR WHATSAPP ADMIN" desc="Format: 628xxxxxx@c.us" mono/>
      </Section>
      <Section title="Pesan Bot" desc="Teks balasan yang dikirim bot. Gunakan {nama} untuk menyisipkan nama wali murid" saveKeys={['MSG_WELCOME','MSG_INFO_PEMBAYARAN','MSG_REQUEST_TF','MSG_HUMAN_MODE']}>
        <Field k="MSG_WELCOME" label="PESAN SAMBUTAN / MENU" area rows={5} desc="Kosongkan untuk menggunakan pesan default. Gunakan *teks* untuk bold di WA."/>
        <Field k="MSG_INFO_PEMBAYARAN" label="PESAN INFO PEMBAYARAN" area rows={6} desc="Kosongkan untuk menggunakan pesan default."/>
        <Field k="MSG_REQUEST_TF" label="PESAN MINTA BUKTI TRANSFER" area rows={3} desc="Ditampilkan saat wali murid memilih opsi kirim bukti transfer."/>
        <Field k="MSG_HUMAN_MODE" label="PESAN SAAT TERHUBUNG KE ADMIN" area rows={3}/>
      </Section>
      <Section title="Pengaturan Fitur" desc="Aktifkan atau nonaktifkan fitur keamanan bot" saveKeys={['VALIDASI_REKENING','CEK_DUPLIKAT','HUMAN_MODE_TIMEOUT']}>
        <Toggle value={(config['VALIDASI_REKENING']??'true')!=='false'} onChange={val=>setC('VALIDASI_REKENING',val.toString())} label="Validasi Rekening Tujuan" desc="Periksa apakah nomor rekening pada bukti transfer sesuai dengan rekening Bimba."/>
        <Toggle value={(config['CEK_DUPLIKAT']??'true')!=='false'} onChange={val=>setC('CEK_DUPLIKAT',val.toString())} label="Cek Duplikat Bukti Transfer" desc="Cegah wali murid mengirim bukti transfer yang sama lebih dari satu kali."/>
        <div style={{marginTop:16}}>
          <label style={{fontSize:12,fontWeight:600,color:v('--text-2'),display:'block',marginBottom:4}}>TIMEOUT MODE ADMIN (menit)</label>
          <p style={{fontSize:12,color:v('--text-3'),marginBottom:6}}>Berapa menit sebelum bot otomatis aktif kembali jika admin tidak merespons.</p>
          <input type="number" min={1} max={60} value={parseInt(config['HUMAN_MODE_TIMEOUT']||'10')} onChange={e=>setC('HUMAN_MODE_TIMEOUT',e.target.value)} style={{width:100,border:`1px solid ${v('--border')}`,borderRadius:v('--radius-sm'),padding:'9px 12px',fontSize:13,background:v('--bg'),color:v('--text')}}/>
        </div>
      </Section>
    </div>
  );
}


// ── PageMessages — Editor Pesan Bot ─────────────────────────
const MSG_SCHEMA = [
  { section:'menu',       key:'sambutan',          label:'Pesan Sambutan / Menu Utama',         vars:['{nama}'] },
  { section:'menu',       key:'tidak_dikenal',      label:'Pesan Tidak Dikenal (Fallback)',       vars:['{nama}'] },
  { section:'opsi_1',     key:'info_pembayaran',    label:'Info Pembayaran (Opsi 1)',             vars:['{bank}','{nama_rekening}','{no_rekening}'] },
  { section:'opsi_2',     key:'minta_bukti',        label:'Minta Bukti Transfer (Opsi 2)',        vars:[] },
  { section:'opsi_2',     key:'teks_saat_waiting',  label:'Teks Diterima saat Menunggu Gambar',  vars:[] },
  { section:'opsi_2',     key:'gambar_terlalu_besar',label:'Gambar Terlalu Besar',               vars:[] },
  { section:'opsi_2',     key:'gagal_download',     label:'Gagal Download Media',                vars:[] },
  { section:'opsi_2',     key:'bukan_gambar',       label:'Media Bukan Gambar',                  vars:[] },
  { section:'opsi_2',     key:'bukan_bukti_transfer',label:'Gambar Bukan Bukti Transfer',        vars:['{deskripsi}'] },
  { section:'opsi_2',     key:'ocr_gagal',          label:'OCR / AI Gagal Membaca',              vars:[] },
  { section:'opsi_2',     key:'duplikat',           label:'Bukti Transfer Duplikat',             vars:[] },
  { section:'opsi_3',     key:'menghubungkan',      label:'Menghubungkan ke Admin (Opsi 3)',     vars:[] },
  { section:'pembayaran', key:'konfirmasi',         label:'Konfirmasi Bukti Transfer Diterima',  vars:['{emoji}','{nama}','{pengirim}','{nominal}','{bank}','{tanggal}','{referensi}','{status}'] },
  { section:'pembayaran', key:'rekening_salah',     label:'Rekening Tujuan Tidak Sesuai',        vars:['{bank}','{no_rekening}','{nama_rekening}'] },
  { section:'admin',      key:'notif_transfer',     label:'Notif Admin — Bukti Transfer Masuk',  vars:['{nama}','{nomor}','{nominal}','{pengirim}','{referensi}','{status}','{confidence}'] },
  { section:'admin',      key:'notif_rekening_salah',label:'Notif Admin — Rekening Salah',       vars:['{nama}','{nomor}','{rekening_ocr}','{rekening_bimba}','{nominal}'] },
  { section:'admin',      key:'notif_human_mode',   label:'Notif Admin — Wali Murid Minta Admin',vars:['{nama}','{nomor}'] },
  { section:'admin',      key:'sesi_berakhir',      label:'Pesan Sesi Admin Berakhir (Timeout)', vars:['{nama}'] },
  { section:'admin',      key:'sesi_selesai',       label:'Pesan Sesi Admin Selesai Manual',     vars:[] },
  { section:'spam',       key:'terlalu_banyak_pesan',label:'Pesan Spam / Rate Limit',            vars:[] },
];

const SECTION_LABELS = {
  menu:'🏠 Menu Utama', opsi_1:'1️⃣ Info Pembayaran', opsi_2:'2️⃣ Bukti Transfer',
  opsi_3:'3️⃣ Hubungi Admin', pembayaran:'💳 Konfirmasi Pembayaran',
  admin:'🔔 Notifikasi Admin', spam:'🚫 Spam Filter',
};

function PageMessages({ api, toast }) {
  const [msgs,    setMsgs]    = useState({});
  const [draft,   setDraft]   = useState({});
  const [loading, setLoading] = useState(false);
  const [saving,  setSaving]  = useState(null);
  const [active,  setActive]  = useState(null);
  const [kwItems, setKwItems] = useState([]);

  useEffect(() => {
    setLoading(true);
    Promise.all([
      api.get('/api/messages'),
      api.get('/api/keyword-responses')
    ])
      .then(([msgData, kwData]) => {
        setMsgs(msgData);
        setDraft(JSON.parse(JSON.stringify(msgData)));
        setKwItems(kwData || []);
      })
      .catch(e => toast(e.message, 'error'))
      .finally(() => setLoading(false));
  }, []);

  function getDraft(section, key) { return draft?.[section]?.[key] ?? ''; }
  function setDraftVal(section, key, val) {
    setDraft(p => ({ ...p, [section]: { ...(p[section]||{}), [key]: val } }));
  }
  function isDirty(section, key) { return getDraft(section, key) !== (msgs?.[section]?.[key] ?? ''); }

  async function saveOne(section, key) {
    setSaving(`${section}.${key}`);
    try {
      const updated = JSON.parse(JSON.stringify(msgs));
      if (!updated[section]) updated[section] = {};
      updated[section][key] = getDraft(section, key);
      await api.put('/api/messages', updated);
      setMsgs(JSON.parse(JSON.stringify(updated)));
      toast('Pesan disimpan!');
    } catch(e) { toast(e.message, 'error'); }
    finally { setSaving(null); }
  }

  async function resetOne(section, key) {
    setDraftVal(section, key, msgs?.[section]?.[key] ?? '');
  }

  const sections = [...new Set(MSG_SCHEMA.map(m => m.section))];

  if (loading) return <div style={{padding:40,textAlign:'center',color:v('--text-3')}}>Memuat pesan...</div>;

  return (
    <div style={{display:'flex',gap:20,alignItems:'flex-start'}}>
      {/* Sidebar section list */}
      <div style={{width:200,flexShrink:0,position:'sticky',top:0}}>
        <div style={{background:v('--surface'),border:`1px solid ${v('--border')}`,borderRadius:v('--radius'),overflow:'hidden'}}>
          <div style={{padding:'12px 14px',borderBottom:`1px solid ${v('--border')}`,fontSize:12,fontWeight:600,color:v('--text-3'),textTransform:'uppercase',letterSpacing:.5}}>Kategori</div>
          {sections.map(s => {
            const dirtyCount = MSG_SCHEMA.filter(m => m.section === s && isDirty(m.section, m.key)).length;
            return (
              <button key={s} onClick={() => setActive(s===active?null:s)} style={{width:'100%',textAlign:'left',padding:'10px 14px',background:active===s?v('--green-50'):'transparent',color:active===s?v('--green-600'):v('--text-2'),fontWeight:active===s?600:400,fontSize:13,borderBottom:`1px solid ${v('--border')}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span>{SECTION_LABELS[s]||s}</span>
                {dirtyCount>0 && <span style={{background:v('--amber'),color:v('--green-900'),borderRadius:99,padding:'1px 7px',fontSize:11,fontWeight:700}}>{dirtyCount}</span>}
              </button>
            );
          })}
          {/* Kategori dinamis dari keyword responses */}
          {kwItems.length > 0 && (
            <button onClick={() => setActive(active==='__keywords__'?null:'__keywords__')} style={{width:'100%',textAlign:'left',padding:'10px 14px',background:active==='__keywords__'?v('--green-50'):'transparent',color:active==='__keywords__'?v('--green-600'):v('--text-2'),fontWeight:active==='__keywords__'?600:400,fontSize:13,borderBottom:`1px solid ${v('--border')}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>💬 Respons Kustom</span>
              <span style={{background:v('--bg'),color:v('--text-3'),borderRadius:99,padding:'1px 7px',fontSize:11}}>{kwItems.length}</span>
            </button>
          )}
        </div>
        <div style={{marginTop:10,fontSize:12,color:v('--text-3'),padding:'0 4px',lineHeight:1.6}}>
          Klik kategori untuk filter. Tombol <strong>Simpan</strong> per pesan — perubahan berlaku langsung tanpa restart server.
        </div>
      </div>

      {/* Editor area */}
      <div style={{flex:1,minWidth:0}}>
        <div style={{marginBottom:20}}>
          <h1 style={{fontSize:22,fontWeight:700}}>Pesan Bot</h1>
          <p style={{color:v('--text-3'),fontSize:13,marginTop:3}}>Edit semua teks balasan bot. Disimpan ke <code style={{background:v('--bg'),padding:'1px 6px',borderRadius:4,fontFamily:v('--mono')}}>messages.json</code> dan berlaku langsung.</p>
        </div>

        <div style={{display:'grid',gap:12}}>
          {MSG_SCHEMA.filter(m => !active || m.section === active).map(({ section, key, label, vars }) => {
            const val     = getDraft(section, key);
            const dirty   = isDirty(section, key);
            const savingThis = saving === `${section}.${key}`;
            return (
              <div key={`${section}.${key}`} style={{background:v('--surface'),border:`1px solid ${dirty?v('--amber-dark'):v('--border')}`,borderRadius:v('--radius'),overflow:'hidden',transition:'border-color .2s'}}>
                <div style={{padding:'12px 16px',borderBottom:`1px solid ${v('--border')}`,background:v('--surface-2'),display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:13}}>{label}</div>
                    <div style={{fontSize:11,color:v('--text-3'),fontFamily:v('--mono'),marginTop:2}}>{section}.{key}</div>
                  </div>
                  <div style={{display:'flex',gap:6,flexShrink:0,alignItems:'center'}}>
                    {dirty && <span style={{fontSize:11,color:v('--amber-dark'),fontWeight:600}}>● Belum disimpan</span>}
                    {dirty && <button onClick={() => resetOne(section, key)} style={{padding:'4px 10px',background:v('--bg'),border:`1px solid ${v('--border')}`,borderRadius:6,fontSize:12,color:v('--text-2')}}>Reset</button>}
                    <button onClick={() => saveOne(section, key)} disabled={savingThis||!dirty} style={{padding:'4px 12px',background:dirty?v('--green-700'):'#e5e7eb',color:dirty?'#fff':v('--text-3'),border:'none',borderRadius:6,fontSize:12,fontWeight:600,opacity:savingThis?.7:1}}>{savingThis?'Menyimpan...':'Simpan'}</button>
                  </div>
                </div>
                <div style={{padding:14}}>
                  {vars.length > 0 && (
                    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
                      {vars.map(vr => (
                        <span key={vr} style={{fontFamily:v('--mono'),fontSize:11,background:v('--blue-light'),color:v('--blue'),border:'1px solid #bfdbfe',borderRadius:99,padding:'2px 8px',cursor:'pointer'}}
                          onClick={() => setDraftVal(section, key, val + vr)}
                          title="Klik untuk sisipkan ke teks">{vr}</span>
                      ))}
                      <span style={{fontSize:11,color:v('--text-3'),alignSelf:'center'}}>← klik untuk sisipkan variabel</span>
                    </div>
                  )}
                  <textarea
                    value={val}
                    onChange={e => setDraftVal(section, key, e.target.value)}
                    rows={Math.max(3, val.split('\n').length + 1)}
                    style={{width:'100%',border:`1px solid ${v('--border')}`,borderRadius:v('--radius-sm'),padding:'9px 12px',fontSize:13,fontFamily:v('--mono'),background:v('--bg'),color:v('--text'),resize:'vertical',lineHeight:1.6}}
                  />
                </div>
              </div>
            );
          })}
          {active === '__keywords__' && kwItems.map(item => (
            <div key={item.id} style={{background:v('--surface'),border:`1px solid ${v('--border')}`,borderRadius:v('--radius'),overflow:'hidden'}}>
              <div style={{padding:'12px 16px',borderBottom:`1px solid ${v('--border')}`,background:v('--surface-2'),display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13}}>{item.keywords.join(', ')}</div>
                  <div style={{fontSize:11,color:v('--text-3'),marginTop:2}}>{item.active ? '✅ Aktif' : '⏸ Nonaktif'}</div>
                </div>
                <span style={{fontSize:12,color:v('--text-3')}}>Edit di halaman Respons Bot</span>
              </div>
              <div style={{padding:14,fontFamily:v('--mono'),fontSize:13,color:v('--text-2'),background:v('--bg'),whiteSpace:'pre-wrap',wordBreak:'break-word'}}>
                {item.response}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}


function App(){
  const[page,setPage]=useState('dashboard');
  const[baseUrl,setBaseUrl]=useState(()=>store.get('bimba_url',''));
  const[apiKey,setApiKey]=useState(()=>store.get('bimba_key',''));
  const[connected,setConnected]=useState(false);
  const{toasts,toast}=useToast();
  const api=useApi(baseUrl,apiKey);
  useEffect(()=>{if(baseUrl&&apiKey)api.get('/health').then(()=>setConnected(true)).catch(()=>setConnected(false));},[baseUrl,apiKey]);
  function handleConnect(url,key){setBaseUrl(url);setApiKey(key);setConnected(true);}
  function handleLogout(){setConnected(false);setBaseUrl('');setApiKey('');store.set('bimba_url','');store.set('bimba_key','');}
  const pages={dashboard:PageDashboard,payments:PagePayments,chat:PageChat,human:PageHuman,messages:PageMessages,responses:PageResponses,spam:PageSpam,settings:PageSettings};
  const PageComponent=pages[page]||PageDashboard;
  return(
    <>
      <style>{`@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}`}</style>
      {(!baseUrl||!apiKey)&&<ConnectModal onConnect={handleConnect}/>}
      <Sidebar active={page} onNav={setPage} onLogout={handleLogout} connected={connected}/>
      <main style={{flex:1,padding:'32px 36px',overflowY:'auto',maxWidth:1100}}><PageComponent api={api} toast={toast}/></main>
      <Toast toasts={toasts}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
